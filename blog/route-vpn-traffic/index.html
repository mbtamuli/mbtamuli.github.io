Now as part of my work, I need to connect to a VPN. The VPN solution is Palo Alto&rsquo;s GlobalProtect VPN &#x1f605; (I&rsquo;ll rant about GlobalProtect VPN some other time!). I can only connect to the VPN using my Dell XPS as it&rsquo;s MAC address was registered. I got another laptop lying around(ThinkPad E470), but the process to get this new laptop&rsquo;s MAC address registered would take around 2 weeks!"><script type=application/ld+json>{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Blog","item":"http://mbtamuli.github.io/blog/"},{"@type":"ListItem","position":2,"name":"Route VPN Traffic","item":"http://mbtamuli.github.io/blog/route-vpn-traffic/"}]}</script><script type=application/ld+json>{"@context":"https://schema.org","@type":"BlogPosting","headline":"Route VPN Traffic","name":"Route VPN Traffic","description":"My personal laptop, my beloved Dell XPS 15, broke down. The SSD was not being detected. Fixing it would take time and I thought I\u0026rsquo;d get it fixed when I less workload.\nNow as part of my work, I need to connect to a VPN. The VPN solution is Palo Alto\u0026rsquo;s GlobalProtect VPN \u0026#x1f605; (I\u0026rsquo;ll rant about GlobalProtect VPN some other time!). I can only connect to the VPN using my Dell XPS as it\u0026rsquo;s MAC address was registered. I got another laptop lying around(ThinkPad E470), but the process to get this new laptop\u0026rsquo;s MAC address registered would take around 2 weeks!\n","keywords":[],"articleBody":"My personal laptop, my beloved Dell XPS 15, broke down. The SSD was not being detected. Fixing it would take time and I thought I’d get it fixed when I less workload.\nNow as part of my work, I need to connect to a VPN. The VPN solution is Palo Alto’s GlobalProtect VPN 😅 (I’ll rant about GlobalProtect VPN some other time!). I can only connect to the VPN using my Dell XPS as it’s MAC address was registered. I got another laptop lying around(ThinkPad E470), but the process to get this new laptop’s MAC address registered would take around 2 weeks!\nUsing a ArchLinux LiveUSB, I was able to check that I could connect to the VPN from the XPS. Just that my SSD was not being detected. To get working quickly, I thought I could figure out a way to route the traffic from the ThinkPad laptop through the Dell XPS laptop(while it was connected to the VPN).\nUsing the getent command, on the Dell XPS, I got the IP address of the hosts I wanted to route using the VPN.\n$ getent hosts git.example.com 172.17.1.174 git.example.com I stored the entries in the /etc/hosts file on the ThinkPad laptop.\nAlso, had to make sure the Dell XPS laptop was able to forward traffic and setup iptables to do NAT.\n$ sudo sysctl -w net.ipv4.ip_forward=1 $ sudo iptables -t nat -A POSTROUTING -o gpd0 -j MASQUERADE Now, to actually route the traffic.\n$ sudo ip route add 172.17.1.174 via 192.168.31.60 In this command, the IP 172.17.1.174 is the IP that we want to be routed through the VPN. The IP 192.168.31.60 is the IP address of the Dell XPS. Since I already have the entry in the /etc/hosts file, I am done.\nBrowse to git.example.com, and voilà. Everything works as expected! 😄\nReferences: These answers helped me understand what I needed to do. Also the man pages of sysctl, iptables and ip route\nhttps://unix.stackexchange.com/questions/511967/how-to-route-traffic-through-vpn-only-accessible-within-vm-without-a-bridged-ad https://superuser.com/questions/1061363/how-to-route-traffic-through-a-vpn-that-is-only-available-through-another-comput https://askubuntu.com/questions/907972/route-all-traffic-of-a-machine-through-another-within-a-subnet ","wordCount":"327","inLanguage":"en","datePublished":"2020-08-26T00:00:00Z","dateModified":"2020-08-26T00:00:00Z","author":{"@type":"Person","name":"mbtamuli"},"mainEntityOfPage":{"@type":"WebPage","@id":"http://mbtamuli.github.io/blog/route-vpn-traffic/"},"publisher":{"@type":"Organization","name":"
